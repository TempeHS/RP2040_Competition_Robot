    />

      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css"

    <link href="css/style.css?v=7" rel="stylesheet" />
    <style>
      .markdown-body {
        box-sizing: border-box;
        width: 100%;
        max-width: 100%;
        margin: 0;
        padding: 2rem 3rem;
        background-color: #0d1117;
        border-radius: var(--bs-card-inner-border-radius, 0.375rem);
      }
      @media (max-width: 767px) {
        .markdown-body {
          padding: 1rem;
        }
      }
      .markdown-body img {
        max-width: 100%;
        height: auto;
      }
    </style>
  </head>
  <body class="bg-dark">
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
      <div class="container-fluid">
        <a class="navbar-brand" href="index.html">
          <i class="bi bi-robot me-2"></i>THS Comp
        </a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNav"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav me-auto">
            <li class="nav-item">
              <a class="nav-link" href="docs.html?doc=Assembly_Instructions"
                ><i class="bi bi-book me-1"></i>Docs</a
              >
            </li>
            <li class="nav-item">
              <a class="nav-link" href="simulator.html"
                ><i class="bi bi-controller me-1"></i>Simulator</a

              >
            </li>
          </ul>
        </div>
      </div>
    </nav>
    <div class="container py-4">
      <div class="row">
        <div class="col-12">
          <div class="card bg-dark border-secondary doc-card mb-4">
            <div class="card-header text-info fw-bold">
              <i class="bi bi-sliders me-2"></i>Side Wall PID Tuning Guide
            </div>
            <div class="card-body p-0">
              <article id="sideGuide" class="markdown-body"></article>
            </div>
          </div>
          <div class="card bg-dark border-secondary doc-card">
            <div class="card-header text-info fw-bold">
              <i class="bi bi-sliders me-2"></i>Front Distance PID Tuning Guide
            </div>
            <div class="card-body p-0">
              <article id="frontGuide" class="markdown-body"></article>
            </div>
          </div>
        </div>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/marked@11.1.1/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.8/dist/purify.min.js"></script>
    <script>
      async function loadMarkdown(url, elementId) {
        try {
          const response = await fetch(url);
          if (!response.ok) throw new Error("Failed to load " + url);
          let markdown = await response.text();
          let html = marked.parse(markdown);
          html = DOMPurify.sanitize(html);
          document.getElementById(elementId).innerHTML = html;
        } catch (e) {
          document.getElementById(elementId).innerHTML =
            '<div class="alert alert-danger">Failed to load guide.</div>';
        }
      }
      loadMarkdown("docs/PID_Real_World_Tuning_Quickstart.md", "sideGuide");
      loadMarkdown(
        "docs/PID_Front_Distance_Tuning_Quickstart.md",
        "frontGuide",
      );
    </script>
  </body>
